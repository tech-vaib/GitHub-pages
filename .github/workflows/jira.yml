name: Create Jira Ticket

on:
  issues:
    types: [opened]

jobs:

  jira:

    runs-on: ubuntu-latest

    steps:

      - name: Extract Issue Data
        run: |

          TITLE="${{ github.event.issue.title }}"
          BODY='${{ github.event.issue.body }}'

          echo "$BODY" > body.txt

          DESC=$(grep -o '{.*}' body.txt | jq -r '.description')

          echo "TITLE=$TITLE" >> $GITHUB_ENV
          echo "DESC=$DESC" >> $GITHUB_ENV
          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Create Jira Ticket
        id: jira
        run: |

          RESPONSE=$(curl -s -X POST \
          -H "Authorization: Basic ${{ secrets.JIRA_AUTH }}" \
          -H "Content-Type: application/json" \
          --data '{
            "fields": {
              "project": {
                "key": "'"${{ secrets.JIRA_PROJECT }}"'"
              },
              "summary": "'"$TITLE"'",
              "description": "'"$DESC"'",
              "issuetype": {
                "name": "Task"
              }
            }
          }' \
          ${{ secrets.JIRA_URL }}/rest/api/3/issue)

          KEY=$(echo $RESPONSE | jq -r '.key')

          echo "JIRA_KEY=$KEY" >> $GITHUB_ENV

      - name: Update GitHub Issue With Jira Link
        run: |

          BODY="Jira ticket created: ${{ secrets.JIRA_URL }}/browse/$JIRA_KEY"

          curl \
          -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER \
          -d "{\"body\":\"$BODY\"}"
