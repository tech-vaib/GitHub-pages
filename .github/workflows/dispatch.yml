<!DOCTYPE html>
<html>
<head>
  <title>Create Jira Ticket</title>
</head>
<body>

<h2>Create Jira Ticket</h2>

<label>Title</label><br>
<input type="text" id="title" required><br><br>

<label>Description</label><br>
<textarea id="description" rows="6" cols="40" required></textarea><br><br>

<button id="submitBtn">Submit</button>

<p id="status"></p>

<script>
document.getElementById("submitBtn").onclick = async function() {

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;

  const payload = {
    title: title,
    description: description
  };

  const workflowUrl = "https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/jira.yml/dispatches";

  try {
    const response = await fetch(workflowUrl, {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer YOUR_PERSONAL_ACCESS_TOKEN" // only needed to trigger workflow_dispatch
      },
      body: JSON.stringify({
        ref: "main",           // branch to run workflow on
        inputs: payload        // title + description
      })
    });

    if(response.ok) {
      document.getElementById("status").innerText = 
        "Jira ticket creation triggered. Please check shortly for the Jira number.";
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
    } else {
      const err = await response.json();
      document.getElementById("status").innerText = "Error: " + err.message;
    }

  } catch(e) {
    document.getElementById("status").innerText = "Error: " + e.message;
  }

}
</script>

</body>
</html>
