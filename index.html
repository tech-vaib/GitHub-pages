<!DOCTYPE html>
<html>
<head>
<title>Submit Data</title>
<style>
body { font-family: Arial; margin: 40px; }
input, textarea { width: 300px; margin-bottom: 10px; }
button { padding: 8px 15px; }
</style>
</head>

<body>

<h2>Submit Information</h2>

<label>Title</label><br>
<input id="title" type="text"><br>

<label>Description</label><br>
<textarea id="description"></textarea><br>

<button onclick="submitData()">Submit</button>

<script>

async function submitData() {

const title = document.getElementById("title").value
const description = document.getElementById("description").value

const response = await fetch(
"https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/submit.yml/dispatches",
{
method: "POST",
headers: {
"Accept": "application/vnd.github+json",
"Authorization": "Bearer YOUR_GITHUB_TOKEN"
},
body: JSON.stringify({
ref: "main",
inputs: {
title: title,
description: description
}
})
})

alert("Submitted! Check GitHub Actions logs.")

}

</script>

</body>
</html>
