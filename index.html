<!DOCTYPE html>
<html>
<head>
<title>Create Jira Ticket</title>
</head>

<body>

<h2>Create Jira Ticket</h2>

<form id="jiraForm" action="https://github.com/YOUR_USER/YOUR_REPO/issues/new">

<label>Title</label>
<br>
<input id="title" required>
<br><br>

<label>Description</label>
<br>
<textarea id="description" rows="6" cols="40" required></textarea>
<br><br>

<input type="hidden" name="title" id="issueTitle">
<input type="hidden" name="body" id="issueBody">

<button type="submit">Submit</button>

</form>

<script>

document.getElementById("jiraForm").onsubmit = function() {

const title = document.getElementById("title").value
const desc = document.getElementById("description").value

document.getElementById("issueTitle").value = title

const payload = {
description: desc
}

document.getElementById("issueBody").value =
"processing\n\n" + JSON.stringify(payload)

}

</script>

</body>
</html>
